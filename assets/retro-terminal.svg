<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#0a0f1d"/>
      <stop offset="1" stop-color="#04070d"/>
    </linearGradient>
    <linearGradient id="glass" x1="140" y1="90" x2="1060" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#22c55e" stop-opacity="0.03"/>
      <stop offset="0.52" stop-color="#22c55e" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="1200" height="520" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="480" rx="22" fill="#0a0f1b" stroke="#2a3550" stroke-width="2"/>
  <rect x="20" y="20" width="1160" height="480" rx="22" fill="url(#scan)" opacity="0.75"/>
  <rect x="40" y="40" width="1120" height="440" rx="18" fill="url(#glass)" stroke="#33415f" stroke-width="1"/>

  <!-- window controls -->
  <circle cx="72" cy="72" r="8" fill="#ff5f57"/>
  <circle cx="100" cy="72" r="8" fill="#febc2e"/>
  <circle cx="128" cy="72" r="8" fill="#28c840"/>

  <text x="170" y="78" fill="#9fb3c8" font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="18">james@linuxbox: ~</text>

  <!-- left prompt block -->
  <g filter="url(#glow)" font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="30">
    <text x="80" y="150" fill="#22c55e">$ whoami</text>
    <text x="220" y="150" fill="#f8fafc">James</text>

    <text x="80" y="205" fill="#38bdf8">$ cat /etc/profile.d/jamesarch</text>
    <text x="80" y="250" fill="#f59e0b">DevOps engineer</text>
    <text x="80" y="292" fill="#a78bfa">Linux/*nix enjoyer</text>
    <text x="80" y="334" fill="#34d399">CLI builder</text>
    <text x="80" y="376" fill="#f472b6">Rust systems-tooling packager</text>
  </g>

  <!-- right neon block -->
  <g filter="url(#glow)" font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="26">
    <text x="675" y="150" fill="#f8fafc">/projects</text>
    <rect x="652" y="170" width="430" height="210" rx="18" fill="#07111d" stroke="#22314d" stroke-width="1.5"/>

    <text x="682" y="208" fill="#22c55e">createrepo_rs</text>
    <text x="890" y="208" fill="#94a3b8">RPM repo metadata</text>

    <text x="682" y="244" fill="#38bdf8">smartdns-rs</text>
    <text x="890" y="244" fill="#94a3b8">DNS / resolver tools</text>

    <text x="682" y="280" fill="#a78bfa">cloudflare-docker-proxy</text>
    <text x="890" y="280" fill="#94a3b8">edge proxy for containers</text>

    <text x="682" y="316" fill="#f59e0b">nixpkgs</text>
    <text x="890" y="316" fill="#94a3b8">package ecosystem work</text>

    <text x="682" y="352" fill="#34d399">homebrew-core</text>
    <text x="890" y="352" fill="#94a3b8">formula maintenance</text>
  </g>

  <text x="80" y="455" fill="#64748b" font-family="JetBrains Mono, Menlo, Consolas, monospace" font-size="17">$ uptime  ➜  systems up, scripts sharp, logs readable</text>
</svg>
